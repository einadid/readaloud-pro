<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<style>
body {
  width: 260px;
  padding: 20px;
  background: #000;
  color: #fff;
  font-family: Arial;
}

h3 {
  text-align: center;
  margin-bottom: 15px;
}

input {
  width: 100%;
}

p {
  text-align: center;
  margin: 5px 0 15px;
  color: #aaa;
}

button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 8px;
  cursor: pointer;
  font-weight: bold;
  border: 2px solid #fff;
  background: #fff;
  color: #000;
  transition: 0.2s;
}

button:hover {
  background: #000;
  color: #fff;
}

#stop {
  background: #000;
  color: #fff;
  border: 2px solid #444;
}

#stop:hover {
  background: #fff;
  color: #000;
}
</style>
</head>

<body>

<h3>ReadAloud</h3>

<input type="range" id="speed" min="0.5" max="2" step="0.1" value="0.9">
<p id="val">Speed: 0.9x</p>

<button id="read">Read</button>
<button id="stop">Stop</button>

<script src="popup.js"></script>

</body>
</html>
